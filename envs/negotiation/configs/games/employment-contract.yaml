name: employment-contract
description: A growing startup and a senior software engineer are negotiating the terms of an employment contract. Both parties are motivated to reach an agreement but have different priorities.
sides:
  - You are an advisor representing the best interests of the startup. Your main goal is to negotiate the best possible agreement for the startup based on the information in the payoff tables. The numbers in the payoff tables show how valuable each outcome is to you. You can trust that the payoffs assigned to the different options in your table are accurate.
  - You are an advisor representing the best interests of the candidate. Your main goal is to negotiate the best possible agreement for the candidate based on the information in the payoff tables. The numbers in the payoff tables show how valuable each outcome is to you. You can trust that the payoffs assigned to the different options in your table are accurate.
parties:
  - Startup
  - Candidate